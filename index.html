<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="./index.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
		<title>Postcard</title>
	</head>
	<body>
        <div class="postcard">
		<header>
			<h1>My Postcard</h1>
            <img src="https://storage.googleapis.com/breathecode-asset-images/5318bde604cf5c915f94897a71b49ab2523101322ea21cb046db1e67c24fa3be.png?raw=true" alt="Postcard Image" />
		</header>
        <aside>
            <p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
            <p>This is so cool can't wait for doing more stuff!</p>
        </aside>
		<main>
			<section class="postcard-form">
				<input type="text" placeholder="Some Name" id="name" name="name" required minlength="4" maxlength="8" size="10" />
				<input type="email" placeholder="Some Email" id="email" name="email" required minlength="4" maxlength="8" size="10" />
				<input type="text" placeholder="Some Comment" id="comment" name="comment" required minlength="4" maxlength="8" size="10" />
			</section>
		</main>
		<footer>
			<button>Send My Postcard</button>
		</footer>
    </div>
	</body>
</html>
