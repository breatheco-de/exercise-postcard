<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My Postcard con Tags Esenciales</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>My Postcard</h1>

				<img src="https://4geeksacademy.github.io/exercise-assets/img/gphotos/4geeks-logo.png" alt="4Geeks Logo" class="logo" />
			</div>

			<div class="postcard-body">
				<div class="column-left">
					<p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
					<p>This is so cool, can't wait to start doing more stuff!</p>
				</div>

				<div class="column-right">
					<h2>Contact Info</h2>
					<h3>Fill the fields</h3>

					<input type="text" placeholder="Some Name" />
					<input type="email" placeholder="Some Email" />
					<input type="text" placeholder="Some comment" />
				</div>
			</div>

			<div class="postcard-footer">
				<button type="submit">Send My Postcard</button>
			</div>
		</div>
	</body>
</html>
