<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Postcard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="postcard">
      <div class="postcard-content">
        <div class="left">
          <h1>My Postcard</h1>
          <p>
            Look how awesome! This is a postcard that I created using HTML5 and CSS3
            during my 4Geeks Academy Course!
          </p>
          <p>This is so cool, can't wait to start doing more stuff!</p>
        </div>
        <div class="right">
          <img src="https://assets.breatheco.de/apis/img/icon/4geeks.png" alt="logo" />
          <input type="text" placeholder="Your Name" />
          <input type="email" placeholder="Your Email" />
          <textarea placeholder="Your Comment"></textarea>
        </div>
      </div>
       <div class="postcard-footer">
        <button>Send My Postcard</button>
      </div>
    </div>
  </body>
</html>
