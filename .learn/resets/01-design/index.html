<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="./index.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
		<title>Postcard</title>
	</head>
	<body>
		<header>
            <h1>My Postcard</h1>
        </header>
		<main>
			<aside>
				<p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
				<p>This is so cool can't wait for doing more stuff!</p>
			</aside>
			<section class="postcard-form">
				<label for="name">Some Name</label>
				<input type="text" id="name" name="name" required minlength="4" maxlength="8" size="10" />
				<label for="email">Some Email</label>
				<input type="text" id="email" name="email" required minlength="4" maxlength="8" size="10" />
				<label for="comment">Some Comment</label>
				<input type="comment" id="comment" name="comment" required minlength="4" maxlength="8" size="10" />
			</section>
		</main>
		<footer>
			<button>Send My Postcard</button>
		</footer>
	</body>
</html>
